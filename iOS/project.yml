name: Filtercycle
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Filtercycle:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        excludes:
          - "Resources/StoreKit/**"
    resources:
      - path: Sources/Resources/Assets.xcassets
      - path: Sources/Resources/StoreKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.filtercycle
        PRODUCT_NAME: Filtercycle
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Filtercycle can remind you about your free monthly logging limit and upcoming filter changes."
    info:
      path: Sources/App/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Sources/App/Filtercycle.entitlements
      properties: {}

  FiltercycleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/FiltercycleTests
    dependencies:
      - target: Filtercycle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.filtercycle.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Filtercycle:
    build:
      targets:
        Filtercycle: all
        FiltercycleTests: [test]
    test:
      targets:
        - FiltercycleTests
      commandLineArguments:
        "-FILTERCYCLE_NO_SK": false
